<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuraCrypt Web</title>
    <meta name="description" content="A secure, client-side encrypted password manager." />
</head>
  <body class="bg-slate-50 dark:bg-dark-950 text-slate-200 font-sans antialiased h-screen overflow-hidden selection:bg-primary-500 selection:text-white relative">
    <!-- Ambient Background: Animations disabled on mobile (using md: prefix) for performance -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-primary-500/20 rounded-full mix-blend-multiply filter blur-3xl opacity-30 md:animate-blob will-change-transform"></div>
        <div class="absolute top-0 right-1/4 w-96 h-96 bg-purple-500/20 rounded-full mix-blend-multiply filter blur-3xl opacity-30 md:animate-blob animation-delay-2000 will-change-transform"></div>
        <div class="absolute -bottom-32 left-1/3 w-96 h-96 bg-pink-500/20 rounded-full mix-blend-multiply filter blur-3xl opacity-30 md:animate-blob animation-delay-4000 will-change-transform"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
